<!DOCTYPE html>
<html>
<head>
<title>Provider Login – Solidarity Pool</title>
<style>
  body { font-family: sans-serif; max-width: 420px; margin: 60px auto; padding: 0 16px; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 22px; background: #fafafa; }
  label { display: block; font-weight: bold; margin-top: 12px; font-size: 0.9rem; }
  input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc;
          border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
  button { margin-top: 18px; padding: 10px 24px; background: #28a745; color: white;
           border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; }
  button:hover { background: #218838; }
  .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24;
           padding: 10px 14px; border-radius: 4px; margin-bottom: 14px; font-size: 0.9rem; }
  .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724;
             padding: 10px 14px; border-radius: 4px; margin-bottom: 14px; font-size: 0.9rem; }
  .links { margin-top: 16px; text-align: center; font-size: 0.88rem; }
  .links a { color: #2d7dd2; }
</style>
</head>
<body>

<h1>Provider Login</h1>
<p class="subtitle">Enter your facility's provider code to access the dashboard.</p>

<div class="card">
  {% if registered_code %}
  <div class="success">
    Registration successful! Log in below with your code: <strong>{{ registered_code }}</strong>
  </div>
  {% endif %}

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label>Provider code
      <input type="text" name="provider_code"
             value="{{ registered_code or '' }}"
             placeholder="e.g. MULAGO001"
             style="text-transform:uppercase"
             required autofocus>
    </label>
    <button type="submit">Log in to Dashboard</button>
  </form>

  <div class="links">
    New facility? <a href="{{ url_for('register') }}">Register as a provider →</a><br>
    <a href="{{ url_for('login') }}">Member login</a>
  </div>
</div>

</body>
</html>
