<!DOCTYPE html>
<html>
<head>
<title>Simulate Round-up – Solidarity Pool</title>
<style>
  body { font-family: sans-serif; max-width: 460px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 22px; background: #fafafa; }
  label { display: block; font-weight: bold; margin-top: 14px; font-size: 0.9rem; }
  input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ccc;
          border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
  button { margin-top: 18px; padding: 10px 24px; background: #28a745; color: white;
           border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; }
  button:hover { background: #218838; }
  .balance-row { display: flex; justify-content: space-between; margin-top: 16px;
                 font-size: 0.88rem; color: #555; }
  .hint { font-size: 0.8rem; color: #888; margin-top: 6px; }
  .nav { margin-top: 20px; }
  .nav a { color: #2d7dd2; text-decoration: none; font-size: 0.9rem; }
</style>
</head>
<body>

<h1>Simulate a Purchase Round-up</h1>
<p class="subtitle">Enter any purchase amount — the cents above the nearest dollar are rounded up to your sub-wallet.</p>

<div class="card">
  <form method="POST">
    <label>Purchase amount (e.g. 12.50)
      <input type="number" step="0.01" min="0.01" name="purchase_amount"
             placeholder="0.00" required autofocus>
      <span class="hint">
        E.g. $12.50 → rounds up $0.50 · $99.80 → rounds up $0.20
      </span>
    </label>
    <button type="submit">Round up &amp; Contribute</button>
  </form>

  <div class="balance-row">
    <span>Current sub-wallet</span>
    <strong>${{ "%.2f"|format(user.sub_wallet_balance) }}</strong>
  </div>
  <div class="balance-row">
    <span>Round-up multiplier</span>
    <strong>{{ user.roundup_intensifier }}×</strong>
  </div>
</div>

<div class="nav"><a href="{{ url_for('home') }}">← Back to dashboard</a></div>

</body>
</html>
