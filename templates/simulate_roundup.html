<!DOCTYPE html>
<html>
<head><title>Simulate Round-up</title></head>
<body>
<h2>Simulate a Purchase</h2>
<form method="POST">
    Purchase amount (e.g., 12.50): <input type="number" step="0.01" name="purchase_amount" required>
    <button type="submit">Round up and contribute</button>
</form>
<p>Your current sub-wallet: ${{ "%.2f"|format(user.sub_wallet_balance) }}</p>
<a href="{{ url_for('home') }}">Back</a>
</body>
</html>
