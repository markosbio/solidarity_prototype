<!DOCTYPE html>
<html>
<head>
<title>Verify PIN – SolidarityPool</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 0 16px; }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 24px; background: #fafafa; }
  label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 0.9rem; }
  input[type=password] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px;
                         box-sizing: border-box; font-size: 1.5rem; letter-spacing: 8px;
                         text-align: center; }
  button { margin-top: 16px; padding: 11px; background: #2d7dd2; color: white; border: none;
           border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; }
  button:hover { background: #2566b0; }
  .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24;
           padding: 10px 14px; border-radius: 4px; margin-bottom: 14px; font-size: 0.9rem; }
  .lock-icon { text-align: center; font-size: 2.5rem; margin-bottom: 12px; }
  .back { display: block; text-align: center; margin-top: 14px; font-size: 0.88rem; color: #2d7dd2; }
</style>
</head>
<body>
<h1>SolidarityPool</h1>
<p class="subtitle">Confirm your identity to continue.</p>

<div class="card">
  <div class="lock-icon">🔐</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input type="hidden" name="next" value="{{ next }}">
    <label for="pin">Enter your PIN (4–6 digits)</label>
    <input type="password" name="pin" id="pin" maxlength="6" inputmode="numeric"
           pattern="[0-9]{4,6}" placeholder="••••••" autofocus required>
    <button type="submit">Confirm →</button>
  </form>

  <a class="back" href="/">← Back to dashboard</a>
</div>
</body>
</html>
