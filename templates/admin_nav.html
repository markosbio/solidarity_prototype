<style>
  .admin-nav {
    background: #1a1a2e;
    color: #fff;
    padding: 0;
    margin: -40px -16px 28px -16px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0;
    font-size: 0.83rem;
    border-bottom: 3px solid #2d7dd2;
  }
  .admin-nav .nav-brand {
    padding: 12px 18px;
    font-weight: bold;
    font-size: 0.95rem;
    color: #fff;
    text-decoration: none;
    background: #2d7dd2;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .admin-nav a {
    padding: 12px 14px;
    color: #ccc;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .admin-nav a:hover { background: #2d3250; color: #fff; }
  .admin-nav a.active { color: #fff; background: #2d3250; border-bottom: 3px solid #2d7dd2; margin-bottom: -3px; }
  .admin-nav .nav-spacer { flex: 1; }
  .admin-nav .nav-user {
    padding: 12px 16px;
    color: #aaa;
    font-size: 0.78rem;
    white-space: nowrap;
  }
  @media (max-width: 600px) {
    .admin-nav { flex-wrap: wrap; }
    .admin-nav a { padding: 10px 10px; font-size: 0.78rem; }
    .admin-nav .nav-brand { width: 100%; }
  }
</style>

<nav class="admin-nav">
  <a class="nav-brand" href="/admin/care">⚙️ Admin Panel</a>
  <a href="/admin/care" {% if request.path == '/admin/care' %}class="active"{% endif %}>📋 Care Queue</a>
  <a href="/admin/monitor" {% if request.path == '/admin/monitor' %}class="active"{% endif %}>📊 Monitor</a>
  <a href="/admin/verified-providers" {% if request.path == '/admin/verified-providers' %}class="active"{% endif %}>🏥 Providers</a>
  <a href="/admin/fraud-alerts" {% if request.path == '/admin/fraud-alerts' %}class="active"{% endif %}>🚨 Fraud</a>
  <a href="/admin/view-user" {% if request.path == '/admin/view-user' %}class="active"{% endif %}>🔍 Users</a>
  <a href="/admin/audit-log" {% if request.path == '/admin/audit-log' %}class="active"{% endif %}>📜 Audit Log</a>
  <a href="/admin/global-admins" {% if request.path == '/admin/global-admins' %}class="active"{% endif %}>🔑 Admins</a>
  <div class="nav-spacer"></div>
  {% if user is defined %}
  <span class="nav-user">{{ user.name }} ({{ user.phone }})</span>
  {% endif %}
  <a href="/" style="color:#aaa;">← Dashboard</a>
</nav>
