<!DOCTYPE html>
<html>
<head><title>Add Provider</title>
<style>
  body { font-family: sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; }
  label { display: block; margin-top: 14px; font-weight: bold; }
  input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
  .hint { font-size: 0.82em; color: #888; margin-top: 3px; }
  button { margin-top: 20px; padding: 10px 24px; background: #2d7dd2; color: white;
           border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
  .error { color: #c00; background: #fff0f0; border: 1px solid #fcc;
           padding: 10px; border-radius: 4px; margin-bottom: 16px; }
</style>
</head>
<body>
<h2>Add Provider</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">
  <label>Provider name
    <input type="text" name="name" placeholder="e.g. Mulago National Hospital" required>
  </label>

  <label>Provider code (unique, uppercase)
    <input type="text" name="provider_code" placeholder="e.g. MULAGO001"
           pattern="[A-Z0-9]+" title="Uppercase letters and numbers only">
    <span class="hint">Used in USSD menus. No spaces.</span>
  </label>

  <label>Payment type
    <select name="payment_type">
      <option value="">— Select —</option>
      <option value="mpesa">M-Pesa</option>
      <option value="bank">Bank transfer</option>
      <option value="till">Till number</option>
      <option value="paybill">Paybill</option>
    </select>
  </label>

  <label>Payment details
    <input type="text" name="payment_details"
           placeholder="e.g. M-Pesa number or account number">
    <span class="hint">This is the number/account funds will be sent to.</span>
  </label>

  <button type="submit">Register Provider</button>
</form>

<p style="margin-top:20px;"><a href="{{ url_for('providers.list_providers') }}">← Back to providers</a></p>
</body>
</html>
