<!DOCTYPE html>
<html>
<head><title>Trust Override – SolidarityPool Admin</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
  h1 { margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
  .card { border: 1px solid #dee2e6; border-radius: 8px; padding: 22px; background: #f8f9fa; }
  label { display: block; font-size: 0.88rem; font-weight: bold; color: #444; margin-top: 14px; }
  input { width: 100%; padding: 9px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px;
          box-sizing: border-box; font-size: 1rem; }
  .hint { font-size: 0.78rem; color: #888; margin-top: 3px; }
  .btn { margin-top: 18px; padding: 10px 24px; background: #2d7dd2; color: white;
         border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
  .btn:hover { background: #2566b0; }
  .warning { background: #fff3cd; border: 1px solid #ffc107; padding: 10px 14px;
             border-radius: 6px; font-size: 0.85rem; margin-bottom: 20px; }
</style>
</head>
<body>
<h1>Trust Score Override</h1>
<p class="subtitle">Admin tool — use sparingly for edge cases only.</p>

<div class="warning">
  All overrides are logged to the trust history and visible in the CSV export.
  Use only when a member has a known data error or technical glitch.
</div>

<div class="card">
  <form method="POST" action="{{ url_for('admin_trust_override_by_phone') }}">
    <label>Member phone number
      <input type="text" name="phone" placeholder="254712345678" required autofocus>
      <span class="hint">Enter phone exactly as registered, without the + prefix.</span>
    </label>
    <label>New trust score
      <input type="number" step="0.001" min="0" max="1" name="trust_score" placeholder="0.750" required>
      <span class="hint">Range: 0.000 (no trust) to 1.000 (maximum). Default is 0.500.</span>
    </label>
    <label>Reason for override
      <input type="text" name="reason" placeholder="Admin override — incorrect witness vote deduction">
      <span class="hint">Shown in trust history. Keep it brief and factual.</span>
    </label>
    <button class="btn" type="submit">Apply Override</button>
  </form>
</div>

<p style="margin-top:20px;">
  <a href="{{ url_for('admin_care') }}">← Admin Panel</a> &nbsp;·&nbsp;
  <a href="{{ url_for('home') }}">← Dashboard</a>
</p>
</body>
</html>
