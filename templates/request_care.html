<!DOCTYPE html>
<html>
<head><title>Request Care</title></head>
<body>
<h2>Request Financial Support</h2>
<form method="POST">
    Amount needed ($): <input type="number" step="0.01" name="needed_amount" required><br>
    Provider ID (e.g., clinic name): <input type="text" name="provider_id" required><br>
    <button type="submit">Submit Request</button>
</form>
<p>Your sub-wallet: ${{ "%.2f"|format(user.sub_wallet_balance) }}</p>
<a href="{{ url_for('home') }}">Back</a>
</body>
</html>
